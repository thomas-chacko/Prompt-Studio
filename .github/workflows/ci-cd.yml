name: Production CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ========================
  # BACKEND (npm)
  # ========================
  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: 📦 Install dependencies
        run: npm ci

      # Uncomment when tests are added
      # - name: 🧪 Run tests
      #   run: npm test

      - name: 🐳 Build Docker image
        run: docker build -t promptstudio-backend:${{ github.sha }} .

      - name: ✅ Docker smoke test
        run: |
          docker run -d --name test-backend -p 5000:5000 promptstudio-backend:${{ github.sha }}
          sleep 5
          docker logs test-backend
          docker stop test-backend

  # ========================
  # FRONTEND (pnpm)
  # ========================
  frontend:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'client/pnpm-lock.yaml'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      # Uncomment when tests are added
      # - name: 🧪 Run tests
      #   run: pnpm test

      - name: 🏗️ Build Next.js
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: 💾 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: client/.next
          retention-days: 7

  # ========================
  # DEPLOY TO PRODUCTION
  # ========================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://promptstudio-web.vercel.app

    steps:
      - name: 🚀 Deploy Backend to Render
        run: |
          response=$(curl -X POST -s -o /dev/null -w "%{http_code}" ${{ secrets.RENDER_DEPLOY_HOOK }})
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "❌ Backend deployment failed with status $response"
            exit 1
          fi
          echo "✅ Backend deployment triggered successfully"

      - name: 🚀 Deploy Frontend to Vercel
        run: |
          response=$(curl -X POST -s -o /dev/null -w "%{http_code}" ${{ secrets.VERCEL_DEPLOY_HOOK }})
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "❌ Frontend deployment failed with status $response"
            exit 1
          fi
          echo "✅ Frontend deployment triggered successfully"

      - name: ⏳ Wait for deployments
        run: sleep 30

      # Optional: Add health check
      - name: 🏥 Health check
        run: |
          curl -f https://prompt-studio-0egh.onrender.com || exit 1
          curl -f https://promptstudio-web.vercel.app || exit 1