name: Production CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========================
  # DETECT CHANGES
  # ========================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Check path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'server/**'
            frontend:
              - 'client/**'

  # ========================
  # BACKEND (npm)
  # ========================
  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: server

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Generate Prisma Client
        run: npx prisma generate

      - name: 🗄️ Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Test the backend API using Jest and Supertest
      - name: 🧪 Run tests
        run: npm test

      - name: 🐳 Build Docker image
        run: docker build -t promptstudio-backend:${{ github.sha }} .

      - name: ✅ Docker smoke test
        run: |
          docker run -d --name test-backend -p 5000:5000 promptstudio-backend:${{ github.sha }}
          sleep 5
          docker logs test-backend
          docker stop test-backend

  # ========================
  # FRONTEND (pnpm)
  # ========================
  frontend:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: client

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'client/pnpm-lock.yaml'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      # Test the frontend using Vitest
      - name: 🧪 Run tests
        run: pnpm test

      - name: 💾 Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/client/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: 🏗️ Build Next.js
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: 💾 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: ${{ github.workspace }}/client/.next
          retention-days: 7
        if: success()

  # ========================
  # DEPLOY TO PRODUCTION
  # ========================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [changes, frontend, backend]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true')
    environment:
      name: production
      url: https://promptstudio-web.vercel.app

    steps:
      - name: 🚀 Deploy Backend to Render
        if: needs.changes.outputs.backend == 'true'
        run: |
          response=$(curl -X POST -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK }}")
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "❌ Backend deployment failed with status $response"
            exit 1
          fi
          echo "✅ Backend deployment triggered successfully"

      - name: 🚀 Deploy Frontend to Vercel
        if: needs.changes.outputs.frontend == 'true'
        run: |
          response=$(curl -X POST -s -o /dev/null -w "%{http_code}" "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "❌ Frontend deployment failed with status $response"
            exit 1
          fi
          echo "✅ Frontend deployment triggered successfully"